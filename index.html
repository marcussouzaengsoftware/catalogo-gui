<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gui Perfumaria | Catálogo Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        :root { --primaria: #0f2621; --detalhe: #d4af37; --whatsapp: #25d366; --fundo: #fcfcfc; --erro: #d9534f; --promo: #e67e22; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--fundo); padding-top: 365px; padding-bottom: 80px; } 

        /* TOPO E CABEÇALHO */
        .topo-fixo { position: fixed; top: 0; left: 0; width: 100%; z-index: 2000; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { background: var(--primaria); color: white; padding: 40px 15px; text-align: center; border-bottom: 6px solid var(--detalhe); position: relative; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--detalhe); text-transform: uppercase; }
        
        /* FILTROS DINÂMICOS */
        .filtros { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: white; border-bottom: 1px solid #eee; scrollbar-width: none; }
        .filtros::-webkit-scrollbar { display: none; }
        .btn-filtro { background: #f0f0f0; border: none; padding: 10px 20px; border-radius: 25px; font-size: 11px; font-weight: 800; white-space: nowrap; cursor: pointer; color: #666; text-transform: uppercase; transition: 0.3s; }
        .btn-filtro.active { background: var(--primaria); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* CARRINHO NO TOPO */
        .cart-superior { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .soma-topo { background: rgba(255,255,255,0.1); border: 1px solid var(--detalhe); color: var(--detalhe); padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.9rem; }
        .btn-cart-topo { background: var(--whatsapp); color: white; border: none; padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 800; }

        /* VITRINE E PRODUTOS */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; }
        .p-card { background: white; border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 12px; display: flex; flex-direction: column; height: 100%; position: relative; }
        .selo-promo { position: absolute; top: 10px; right: 10px; background: var(--promo); color: white; font-size: 9px; padding: 4px 8px; border-radius: 20px; font-weight: 800; text-transform: uppercase; z-index: 10; }
        .p-card img { width: 100%; height: 130px; object-fit: contain; margin-bottom: 10px; }
        .p-nome { font-size: 0.85rem; font-weight: 700; min-height: 40px; margin-bottom: 5px; color: #333; }
        .p-preco-de { font-size: 0.75rem; color: #999; text-decoration: line-through; display: block; height: 15px; }
        .p-preco-por { font-weight: 800; color: var(--primaria); font-size: 1.25rem; display: block; margin-bottom: 5px; }
        .p-preco-por.em-oferta { color: var(--promo); }

        /* BARRA DE ESTOQUE */
        .area-escassez { margin-top: auto; padding-top: 10px; }
        .txt-escassez { font-size: 9px; font-weight: 800; color: var(--erro); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .barra-estoque { width: 100%; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .progresso-estoque { height: 100%; background: var(--erro); transition: width 0.5s; }

        .btn-add { background: var(--primaria); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .btn-add:disabled { background: #ccc; }

        /* BOTÃO SUPORTE */
        .btn-suporte { position: fixed; bottom: 20px; left: 20px; background: white; color: #333; padding: 10px 15px; border-radius: 30px; display: flex; align-items: center; gap: 8px; text-decoration: none; font-weight: 800; font-size: 0.8rem; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #eee; z-index: 3000; }
        
        /* MODAL */
        #modal-resumo { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 4000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 450px; border-radius: 20px; padding: 25px; }
    </style>
</head>
<body>

<div class="topo-fixo">
    <header>
        <div class="cart-superior" id="cart-ui" style="display:none;">
            <div class="soma-topo" id="soma-topo">R$ 0,00</div>
            <button class="btn-cart-topo" onclick="abrirResumo()">
                <i class="material-icons" style="font-size:18px;">shopping_basket</i>
                PEDIDO (<span id="count-topo">0</span>)
            </button>
        </div>
        <h1>Gui Perfumaria</h1>
        <p>Aline Nascimento • Consultora</p>
    </header>

    <div class="filtros" id="lista-filtros">
        <button class="btn-filtro active" onclick="filtrar('todos', this)">TODOS</button>
    </div>
</div>

<div id="loading" style="text-align:center; padding:100px; font-weight:800;">ORGANIZANDO PRODUTOS...</div>
<div class="vitrine" id="vitrine"></div>

<a href="https://wa.me/5571987692157?text=Olá Aline! Tenho uma dúvida sobre o catálogo." target="_blank" class="btn-suporte">
    <i class="material-icons" style="color:#25d366">whatsapp</i> DÚVIDAS?
</a>

<div id="modal-resumo">
    <div class="modal-content">
        <h3 style="font-weight: 800; margin-bottom: 15px;">MEU PEDIDO</h3>
        <div id="lista-resumo"></div>
        <div id="modal-total" style="font-weight: 800; font-size: 1.6rem; text-align: right; margin-top: 20px;">Total: R$ 0,00</div>
        <button style="background:var(--whatsapp); color:white; width:100%; border:none; padding:18px; border-radius:12px; font-weight:800; margin-top:20px; cursor:pointer;" onclick="enviarWhatsapp()">FINALIZAR NO WHATSAPP</button>
        <p onclick="fecharResumo()" style="text-align:center; margin-top:20px; cursor:pointer; color:#999; font-weight:800; font-size:12px;">CONTINUAR COMPRANDO</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQZxhG0vIEsRAw40jA4v1vMauSy16U-qKuvOmzVTYHIdKLz89jzHvaKxbDA2NQI2xnYRgn2a-DFdUjc/pub?output=csv&cachebust=' + new Date().getTime();

let carrinho = {}; 
let categoriasUnicas = new Set();

function converterParaCentavos(texto) {
    if (!texto || texto === "") return 0;
    let limpo = texto.toString().replace(/[R$\s.]/g, '').replace(',', '.');
    return Math.round(parseFloat(limpo) * 100) || 0;
}

function formatarMoeda(centavos) {
    return (centavos / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function carregarDados() {
    Papa.parse(URL_CSV, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            window.PRODUTOS = results.data.map((item, idx) => {
                const v = Object.values(item);
                const pNormal = String(v[4] || "0,00").trim();
                const pPromo = String(v[7] || "").trim();
                const cat = String(v[2] || "Geral").trim(); // COLUNA C
                
                if(cat && cat !== "Categoria") categoriasUnicas.add(cat);

                return { 
                    id: idx, 
                    nome: String(v[3] || "").trim(), 
                    categoria: cat,
                    precoOriginal: pNormal,
                    precoPromo: pPromo,
                    precoVendaCents: pPromo !== "" ? converterParaCentavos(pPromo) : converterParaCentavos(pNormal),
                    img: String(v[5] || "").trim(), 
                    estoqueOriginal: parseInt(v[6]) || 0,
                    estoqueAtual: parseInt(v[6]) || 0
                };
            }).filter(p => p.nome);

            gerarBotoesFiltro();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('cart-ui').style.display = 'flex';
            render(window.PRODUTOS);
        }
    });
}

function gerarBotoesFiltro() {
    const div = document.getElementById('lista-filtros');
    categoriasUnicas.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'btn-filtro';
        btn.innerText = cat;
        btn.onclick = () => filtrar(cat, btn);
        div.appendChild(btn);
    });
}

function filtrar(cat, btn) {
    document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const filtrados = cat === 'todos' ? window.PRODUTOS : window.PRODUTOS.filter(p => p.categoria === cat);
    render(filtrados);
}

function render(lista) {
    const v = document.getElementById('vitrine');
    v.innerHTML = lista.map((p) => {
        const temPromo = p.precoPromo !== "";
        const critico = p.estoqueAtual > 0 && p.estoqueAtual <= 3;
        const porcentagem = (p.estoqueAtual / (p.estoqueOriginal || 1)) * 100;

        return `
        <div class="p-card">
            ${temPromo ? '<div class="selo-promo">Oferta</div>' : ''}
            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=Produto'">
            <div class="p-nome">${p.nome}</div>
            <div class="p-preco-de">${temPromo ? 'De: R$ ' + p.precoOriginal : ''}</div>
            <div class="p-preco-por ${temPromo ? 'em-oferta' : ''}">
                ${temPromo ? 'Por: R$ ' + p.precoPromo : 'R$ ' + p.precoOriginal}
            </div>
            <div class="area-escassez">
                ${critico ? `<span class="txt-escassez">🔥 Só restam ${p.estoqueAtual}!</span>` : `<span style="font-size:9px; color:#999; font-weight:700">Estoque: ${p.estoqueAtual}</span>`}
                <div class="barra-estoque"><div class="progresso-estoque" style="width: ${porcentagem}%"></div></div>
            </div>
            <button class="btn-add" onclick="addCart(${p.id})" ${p.estoqueAtual <= 0 ? 'disabled' : ''}>
                ${p.estoqueAtual <= 0 ? 'ESGOTADO' : 'ADICIONAR'}
            </button>
        </div>`;
    }).join('');
}

function addCart(id) {
    const p = window.PRODUTOS.find(prod => prod.id === id);
    if (p.estoqueAtual <= 0) return;
    if (!carrinho[p.nome]) {
        carrinho[p.nome] = { precoCents: p.precoVendaCents, exibirPreco: p.precoPromo !== "" ? p.precoPromo : p.precoOriginal, qtd: 1, id: id };
    } else { carrinho[p.nome].qtd++; }
    p.estoqueAtual--;
    atualizarTudo();
}

function mudarQtd(nome, delta) {
    const item = carrinho[nome];
    const p = window.PRODUTOS.find(prod => prod.id === item.id);
    if (delta > 0) {
        if (p.estoqueAtual <= 0) return;
        item.qtd++; p.estoqueAtual--;
    } else {
        item.qtd--; p.estoqueAtual++;
        if (item.qtd <= 0) delete carrinho[nome];
    }
    atualizarTudo();
    if (Object.keys(carrinho).length === 0) fecharResumo();
}

function atualizarTudo() {
    let totalCents = 0, totalItens = 0;
    for (let nome in carrinho) {
        totalCents += carrinho[nome].precoCents * carrinho[nome].qtd;
        totalItens += carrinho[nome].qtd;
    }
    document.getElementById('soma-topo').innerText = formatarMoeda(totalCents);
    document.getElementById('modal-total').innerText = `Total: ${formatarMoeda(totalCents)}`;
    document.getElementById('count-topo').innerText = totalItens;
}

function abrirResumo() {
    const lista = document.getElementById('lista-resumo');
    const nomes = Object.keys(carrinho);
    if (nomes.length === 0) return;
    lista.innerHTML = nomes.map(nome => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #eee;">
            <div><b>${nome}</b><br><small>R$ ${carrinho[nome].exibirPreco}</small></div>
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="material-icons" style="cursor:pointer; color:var(--erro)" onclick="mudarQtd('${nome}', -1)">remove_circle</i>
                <b>${carrinho[nome].qtd}</b>
                <i class="material-icons" style="cursor:pointer; color:var(--primaria)" onclick="mudarQtd('${nome}', 1)">add_circle</i>
            </div>
        </div>`).join('');
    document.getElementById('modal-resumo').style.display = 'flex';
}

function fecharResumo() { document.getElementById('modal-resumo').style.display = 'none'; }

function enviarWhatsapp() {
    let msg = "*PEDIDO - GUI PERFUMARIA*\n\n";
    let total = 0;
    for (let nome in carrinho) {
        msg += `✅ ${carrinho[nome].qtd}x ${nome} (R$ ${carrinho[nome].exibirPreco})\n`;
        total += carrinho[nome].precoCents * carrinho[nome].qtd;
    }
    msg += `\n*TOTAL: ${formatarMoeda(total)}*`;
    window.open(`https://wa.me/5571987692157?text=${encodeURIComponent(msg)}`, '_blank');
    
    setTimeout(() => { window.location.href = 'obrigado.html'; }, 1000);
}
carregarDados();
</script>
</body>
</html>
