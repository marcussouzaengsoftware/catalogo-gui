<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gui Perfumaria | Catálogo Digital</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        :root { --primaria: #0f2621; --detalhe: #d4af37; --whatsapp: #25d366; --fundo: #fcfcfc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--fundo); padding-bottom: 50px; }
        
        header { background: var(--primaria); color: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--detalhe); }
        
        /* Layout de Tela Cheia */
        .container-full { width: 100%; padding: 0 10px; }

        /* SEÇÃO DE LOGOS PADRONIZADAS */
        .area-catalogos { background: white; padding: 15px 0; border-bottom: 1px solid #eee; text-align: center; }
        .titulo-secao { font-size: 10px; font-weight: bold; color: #999; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        .grade-logos { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .item-logo { text-decoration: none; display: flex; flex-direction: column; align-items: center; width: 75px; }
        
        .img-box { width: 60px; height: 60px; border-radius: 50%; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; background: white; margin-bottom: 5px; overflow: hidden; }
        .img-box img { width: 85%; height: 85%; object-fit: contain; }
        .item-logo span { font-size: 9px; font-weight: 800; color: #333; text-transform: uppercase; }

        .nav-categorias { background: white; padding: 10px; overflow-x: auto; display: flex; gap: 8px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 999; }
        .cat-btn { padding: 6px 15px; border-radius: 20px; border: 1px solid var(--primaria); background: transparent; font-size: 0.7rem; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--primaria); color: white; }

        /* Vitrine Ocupando a Tela Toda */
        .vitrine { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 10px; 
            padding: 10px 0;
            width: 100%;
        }
        
        .p-card { background: white; border: 1px solid #eee; padding: 10px; text-align: center; border-radius: 8px; display: flex; flex-direction: column; height: 100%; }
        .p-card img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 8px; }
        .p-nome { font-size: 0.8rem; font-weight: 600; min-height: 35px; line-height: 1.2; margin-bottom: 8px; }
        .p-preco { font-weight: 800; color: var(--primaria); font-size: 1rem; }
    </style>
</head>
<body>

<header>
    <h1 style="color: var(--detalhe); font-size: 1.3rem; letter-spacing: 2px;">GUI PERFUMARIA</h1>
    <p style="font-size: 0.75rem;">Consultora: Aline Nascimento</p>
</header>

<div class="area-catalogos">
    <p class="titulo-secao">Catálogos Aline Nascimento</p>
    <div class="grade-logos">
        <a href="https://www.natura.com.br/consultoria/alinenascimento" target="_blank" class="item-logo">
            <div class="img-box"><img src="https://upload.wikimedia.org/wikipedia/pt/thumb/b/b3/Natura_Logo.png/200px-Natura_Logo.png"></div>
            <span>Natura</span>
        </a>
        <a href="https://catalogo.oboticario.com.br/" target="_blank" class="item-logo">
            <div class="img-box"><img src="https://logospng.org/wp-content/uploads/o-boticario.png"></div>
            <span>Boticário</span>
        </a>
        <a href="https://www.eudora.com.br/guia-virtual/" target="_blank" class="item-logo">
            <div class="img-box"><img src="https://logodownload.org/wp-content/uploads/2018/02/eudora-logo.png"></div>
            <span>Eudora</span>
        </a>
        <a href="https://www.ouiparis.com/guia-virtual" target="_blank" class="item-logo">
            <div class="img-box"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A6R_A6y9_7hDk6_8_2-V-uY6m2l0R4x2qg&s"></div>
            <span>O.U.i</span>
        </a>
    </div>
</div>

<div class="container-full">
    <div class="nav-categorias" id="filtro-marcas">
        <button class="cat-btn active" onclick="filtrar('TODOS', this)">Todos</button>
    </div>

    <div id="loading" style="text-align:center; padding:40px; font-size: 0.8rem;">Carregando Vitrine...</div>
    <div class="vitrine" id="vitrine" style="display:none;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQZxhG0vIEsRAw40jA4v1vMauSy16U-qKuvOmzVTYHIdKLz89jzHvaKxbDA2NQI2xnYRgn2a-DFdUjc/pub?output=csv';

function carregarDados() {
    Papa.parse(URL_CSV, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            window.PRODUTOS = results.data.map(item => {
                const v = Object.values(item);
                return {
                    marca: v[1] || "",
                    nome: v[3] || "",
                    preco: v[4] || "0,00",
                    img: v[5] || "",
                    estoque: parseInt(v[6]) || 0
                };
            }).filter(p => p.nome);
            
            const marcas = [...new Set(window.PRODUTOS.map(p => p.marca))].filter(Boolean);
            marcas.forEach(m => document.getElementById('filtro-marcas').innerHTML += `<button class="cat-btn" onclick="filtrar('${m}', this)">${m}</button>`);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('vitrine').style.display = 'grid';
            render('TODOS');
        }
    });
}

function filtrar(m, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(m);
}

function render(filtro) {
    const v = document.getElementById('vitrine');
    const filtrados = filtro === 'TODOS' ? window.PRODUTOS : window.PRODUTOS.filter(p => p.marca === filtro);
    v.innerHTML = filtrados.map(p => `
        <div class="p-card">
            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=Sem+Foto'">
            <div class="p-nome">${p.nome}</div>
            <div class="p-preco">R$ ${p.preco}</div>
        </div>`).join('');
}
carregarDados();
</script>
</body>
</html>
