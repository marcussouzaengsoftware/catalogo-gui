<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gui Perfumaria | Catálogo Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        :root { --primaria: #0f2621; --detalhe: #d4af37; --whatsapp: #25d366; --fundo: #fcfcfc; --erro: #d9534f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--fundo); padding-top: 280px; padding-bottom: 120px; } 

        /* Topo e Identidade */
        .topo-fixo { position: fixed; top: 0; left: 0; width: 100%; z-index: 2000; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { background: var(--primaria); color: white; padding: 30px 10px; text-align: center; border-bottom: 5px solid var(--detalhe); }
        header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--detalhe); text-transform: uppercase; }
        header p { font-size: 1.1rem; font-weight: 700; color: #fff; margin-top: 5px; }
        
        .area-catalogos { background: white; padding: 15px 0; border-bottom: 1px solid #eee; text-align: center; }
        .grade-logos { display: flex; justify-content: center; gap: 15px; }
        .item-logo { text-decoration: none; display: flex; flex-direction: column; align-items: center; width: 75px; }
        .img-box { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; background: white; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }

        /* Vitrine e Produtos */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; }
        .p-card { background: white; border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 12px; display: flex; flex-direction: column; height: 100%; }
        .p-card img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
        .p-nome { font-size: 0.85rem; font-weight: 700; min-height: 40px; margin-bottom: 8px; color: #333; }
        .p-preco { font-weight: 800; color: var(--primaria); font-size: 1.2rem; margin-bottom: 5px; }
        .p-estoque { font-size: 11px; color: var(--erro); font-weight: bold; margin-bottom: 10px; }
        .btn-add { background: var(--primaria); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: auto; }
        .btn-add:disabled { background: #ccc; cursor: not-allowed; }

        /* Barra Flutuante (Soma + Carrinho) */
        .cart-container { position: fixed; bottom: 20px; right: 20px; z-index: 3000; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .soma-flutuante { background: white; border: 2px solid var(--whatsapp); color: var(--whatsapp); padding: 8px 18px; border-radius: 25px; font-weight: 900; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .cart-fixo { background: var(--whatsapp); color: white; padding: 15px 25px; border-radius: 50px; display: flex; align-items: center; gap: 10px; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Modal e Resumo */
        #modal-resumo { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 4000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 450px; border-radius: 15px; padding: 25px; max-height: 85vh; overflow-y: auto; }
        
        .header-resumo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f1f1f1; padding-bottom: 10px; }
        .btn-limpar { background: none; border: 1.5px solid var(--erro); color: var(--erro); padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 4px; text-transform: uppercase; }
        
        .item-resumo { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .controles-qtd { display: flex; align-items: center; gap: 12px; }
        .total-resumo { font-weight: 900; font-size: 1.5rem; text-align: right; margin-top: 20px; color: var(--primaria); padding-top: 15px; }
        .btn-confirmar { background: var(--whatsapp); color: white; width: 100%; border: none; padding: 18px; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="topo-fixo">
    <header>
        <h1>Gui Perfumaria</h1>
        <p>Consultora: Aline Nascimento</p>
    </header>
    <div class="area-catalogos">
        <div class="grade-logos">
            <a href="#" class="item-logo"><div class="img-box"><img src="assets/natura.png"></div><span>Natura</span></a>
            <a href="#" class="item-logo"><div class="img-box"><img src="assets/boticario.png"></div><span>Boticário</span></a>
            <a href="#" class="item-logo"><div class="img-box"><img src="assets/eudora.jpeg"></div><span>Eudora</span></a>
            <a href="#" class="item-logo"><div class="img-box"><img src="assets/oui.png"></div><span>O.U.i</span></a>
        </div>
    </div>
</div>

<div id="loading" style="text-align:center; padding:100px; font-weight:bold;">CARREGANDO...</div>
<div class="vitrine" id="vitrine"></div>

<div class="cart-container" id="cart-container" style="display:none;">
    <div class="soma-flutuante" id="soma-visivel">R$ 0,00</div>
    <button class="cart-fixo" onclick="abrirResumo()">
        <i class="material-icons">shopping_cart</i> VER PEDIDO
    </button>
</div>

<div id="modal-resumo">
    <div class="modal-content">
        <div class="header-resumo">
            <h3>🛒 Meu Pedido</h3>
            <button class="btn-limpar" onclick="limparPedido()">
                <i class="material-icons" style="font-size:16px;">delete_outline</i> Limpar
            </button>
        </div>
        <div id="lista-resumo"></div>
        <div class="total-resumo" id="modal-total">Total: R$ 0,00</div>
        <button class="btn-confirmar" onclick="enviarWhatsapp()">CONCLUIR NO WHATSAPP</button>
        <p onclick="fecharResumo()" style="text-align:center; margin-top:20px; cursor:pointer; color:#666; font-weight:bold;">Voltar ao Catálogo</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQZxhG0vIEsRAw40jA4v1vMauSy16U-qKuvOmzVTYHIdKLz89jzHvaKxbDA2NQI2xnYRgn2a-DFdUjc/pub?output=csv';
let carrinho = {}; 

function converterParaCentavos(texto) {
    if (!texto) return 0;
    let limpo = texto.toString().replace(/[R$\s.]/g, '').replace(',', '.');
    return Math.round(parseFloat(limpo) * 100) || 0;
}

function formatarMoeda(centavos) {
    return (centavos / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function carregarDados() {
    Papa.parse(URL_CSV, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            window.PRODUTOS = results.data.map((item, idx) => {
                const v = Object.values(item);
                return { 
                    id: idx, nome: String(v[3] || "").trim(), 
                    precoTexto: String(v[4] || "0,00").trim(), 
                    img: String(v[5] || "").trim(), 
                    estoqueOriginal: parseInt(v[6]) || 0,
                    estoqueAtual: parseInt(v[6]) || 0
                };
            }).filter(p => p.nome);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('cart-container').style.display = 'flex';
            render();
        }
    });
}

function render() {
    const v = document.getElementById('vitrine');
    v.innerHTML = window.PRODUTOS.map((p) => `
        <div class="p-card">
            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=Produto'">
            <div class="p-nome">${p.nome}</div>
            <div class="p-preco">R$ ${p.precoTexto}</div>
            <div class="p-estoque" id="est-${p.id}">Estoque: ${p.estoqueAtual}</div>
            <button class="btn-add" id="btn-${p.id}" onclick="addCart(${p.id})" ${p.estoqueAtual <= 0 ? 'disabled' : ''}>
                ${p.estoqueAtual <= 0 ? 'ESGOTADO' : 'ADICIONAR'}
            </button>
        </div>`).join('');
}

function addCart(id) {
    const p = window.PRODUTOS[id];
    if (p.estoqueAtual <= 0) return;

    if (!carrinho[p.nome]) {
        carrinho[p.nome] = { precoCents: converterParaCentavos(p.precoTexto), precoOriginal: p.precoTexto, qtd: 1, id: id };
    } else {
        carrinho[p.nome].qtd++;
    }

    p.estoqueAtual--;
    atualizarTudo();
}

function mudarQtd(nome, delta) {
    const item = carrinho[nome];
    const p = window.PRODUTOS[item.id];

    if (delta > 0) {
        if (p.estoqueAtual <= 0) return alert("Estoque máximo atingido!");
        item.qtd++; p.estoqueAtual--;
    } else {
        item.qtd--; p.estoqueAtual++;
        if (item.qtd <= 0) delete carrinho[nome];
    }
    atualizarTudo();
    if (Object.keys(carrinho).length === 0) fecharResumo();
    else abrirResumo();
}

function limparPedido() {
    if(!confirm("Deseja realmente limpar todo o pedido?")) return;
    for (let nome in carrinho) {
        const item = carrinho[nome];
        window.PRODUTOS[item.id].estoqueAtual += item.qtd;
    }
    carrinho = {};
    atualizarTudo();
    fecharResumo();
}

function atualizarTudo() {
    let totalCents = 0;
    for (let nome in carrinho) {
        totalCents += carrinho[nome].precoCents * carrinho[nome].qtd;
    }

    document.getElementById('soma-visivel').innerText = formatarMoeda(totalCents);
    document.getElementById('modal-total').innerText = `Total: ${formatarMoeda(totalCents)}`;

    window.PRODUTOS.forEach(p => {
        const est = document.getElementById(`est-${p.id}`);
        const btn = document.getElementById(`btn-${p.id}`);
        if(est) est.innerText = `Estoque: ${p.estoqueAtual}`;
        if(btn) {
            btn.disabled = p.estoqueAtual <= 0;
            btn.innerText = p.estoqueAtual <= 0 ? 'ESGOTADO' : 'ADICIONAR';
        }
    });
}

function abrirResumo() {
    const lista = document.getElementById('lista-resumo');
    const nomes = Object.keys(carrinho);
    if (nomes.length === 0) return fecharResumo();

    lista.innerHTML = nomes.map(nome => `
        <div class="item-resumo">
            <div><b>${nome}</b><br><small>R$ ${carrinho[nome].precoOriginal}</small></div>
            <div class="controles-qtd">
                <i class="material-icons" style="cursor:pointer; color:var(--erro)" onclick="mudarQtd('${nome}', -1)">remove_circle_outline</i>
                <b style="font-size:1.1rem">${carrinho[nome].qtd}</b>
                <i class="material-icons" style="cursor:pointer; color:var(--primaria)" onclick="mudarQtd('${nome}', 1)">add_circle_outline</i>
            </div>
        </div>`).join('');
    document.getElementById('modal-resumo').style.display = 'flex';
}

function fecharResumo() { document.getElementById('modal-resumo').style.display = 'none'; }

function enviarWhatsapp() {
    let msg = "*NOVO PEDIDO - GUI PERFUMARIA*\n\n";
    let total = 0;
    for (let nome in carrinho) {
        msg += `✅ ${carrinho[nome].qtd}x ${nome}\n`;
        total += carrinho[nome].precoCents * carrinho[nome].qtd;
    }
    msg += `\n*TOTAL: ${formatarMoeda(total)}*`;
    // WHATSAPP CORRIGIDO ABAIXO
    window.open(`https://wa.me/5571987692157?text=${encodeURIComponent(msg)}`);
}
carregarDados();
</script>
</body>
</html>
