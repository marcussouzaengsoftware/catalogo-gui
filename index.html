<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gui Perfumaria | Catálogo Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primaria: #0f2621; --detalhe: #d4af37; --fundo: #fcfcfc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--fundo); padding-top: 240px; } 
        .topo-fixo { position: fixed; top: 0; left: 0; width: 100%; z-index: 2000; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { background: var(--primaria); color: white; padding: 30px 10px; text-align: center; border-bottom: 5px solid var(--detalhe); }
        header h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--detalhe); text-transform: uppercase; }
        header p { font-size: 1.3rem; font-weight: 700; color: #fff; margin-top: 5px; }
        .area-catalogos { background: white; padding: 15px 0; border-bottom: 1px solid #eee; text-align: center; }
        .grade-logos { display: flex; justify-content: center; gap: 20px; }
        .item-logo { text-decoration: none; display: flex; flex-direction: column; align-items: center; width: 80px; }
        .img-box { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; background: white; margin-bottom: 5px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        .item-logo span { font-size: 10px; font-weight: 800; color: #333; text-transform: uppercase; }
        .nav-categorias { background: white; padding: 12px; overflow-x: auto; display: flex; gap: 8px; border-bottom: 1px solid #eee; }
        .cat-btn { padding: 8px 18px; border-radius: 25px; border: 1px solid var(--primaria); background: transparent; font-size: 0.8rem; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--primaria); color: white; }
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; width: 100%; }
        .p-card { background: white; border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 12px; display: flex; flex-direction: column; height: 100%; }
        .p-card img { width: 100%; height: 140px; object-fit: contain; margin-bottom: 10px; }
        .p-nome { font-size: 0.85rem; font-weight: 600; min-height: 45px; margin-bottom: 10px; color: #222; }
        .p-preco { font-weight: 800; color: var(--primaria); font-size: 1.2rem; margin-bottom: 5px; }
        .p-estoque { font-size: 12px; font-weight: 800; color: #444; background: #e9ecef; padding: 6px; border-radius: 6px; margin-top: auto; }
        .esgotado { color: #fff; background: #d9534f; }
    </style>
</head>
<body>

<div class="topo-fixo">
    <header>
        <h1>Gui Perfumaria</h1>
        <p>Consultora: Aline Nascimento</p>
    </header>

    <div class="area-catalogos">
        <div class="grade-logos">
            <a href="https://encurtador.naturaavon.com/hTUzboh" target="_blank" class="item-logo">
                <div class="img-box"><img src="https://static.natura.com/cdn/ff/R2T8S" onerror="this.src='https://upload.wikimedia.org/wikipedia/pt/thumb/b/b3/Natura_Logo.png/200px-Natura_Logo.png'"></div>
                <span>Natura</span>
            </a>
            <a href="https://minhaloja.boticario.com.br/aline-nascimento?utm_source=app_divulgar&utm_medium=divulgar_catalogo&utm_campaign=ciclo_atual" target="_blank" class="item-logo">
                <div class="img-box"><img src="https://logodownload.org/wp-content/uploads/2014/10/o-boticario-logo-8.png"></div>
                <span>Boticário</span>
            </a>
            <a href="https://minhaloja.eudora.com.br/aline-nascimento?utm_source=app_divulgar&utm_medium=divulgar_catalogo&utm_campaign=ciclo_atual" target="_blank" class="item-logo">
                <div class="img-box"><img src="https://logodownload.org/wp-content/uploads/2018/02/eudora-logo.png"></div>
                <span>Eudora</span>
            </a>
            <a href="https://minhaloja.ouiparis.com/aline-nascimento?utm_source=app_divulgar&utm_medium=divulgar_catalogo&utm_campaign=ciclo_atual" target="_blank" class="item-logo">
                <div class="img-box"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A6R_A6y9_7hDk6_8_2-V-uY6m2l0R4x2qg&s"></div>
                <span>O.U.i</span>
            </a>
        </div>
    </div>

    <div class="nav-categorias" id="filtro-marcas">
        <button class="cat-btn active" onclick="filtrar('TODOS', this)">Todos</button>
    </div>
</div>

<div id="loading" style="text-align:center; padding:100px; font-weight:bold;">Carregando Vitrine...</div>
<div class="vitrine" id="vitrine" style="display:none;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQZxhG0vIEsRAw40jA4v1vMauSy16U-qKuvOmzVTYHIdKLz89jzHvaKxbDA2NQI2xnYRgn2a-DFdUjc/pub?output=csv';

function carregarDados() {
    Papa.parse(URL_CSV, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            window.PRODUTOS = results.data.map(item => {
                const colunas = Object.values(item);
                return {
                    marca: (colunas[1] || "").trim(),
                    nome: (colunas[3] || "").trim(),
                    preco: colunas[4] || "0,00",
                    img: colunas[5] || "",
                    estoque: parseInt(colunas[6]) || 0
                };
            }).filter(p => p.nome);
            
            const marcas = [...new Set(window.PRODUTOS.map(p => p.marca))].filter(Boolean);
            marcas.forEach(m => document.getElementById('filtro-marcas').innerHTML += `<button class="cat-btn" onclick="filtrar('${m}', this)">${m}</button>`);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('vitrine').style.display = 'grid';
            render('TODOS');
        }
    });
}

function filtrar(m, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(m);
}

function render(filtro) {
    const v = document.getElementById('vitrine');
    const filtrados = filtro === 'TODOS' ? window.PRODUTOS : window.PRODUTOS.filter(p => p.marca === filtro);
    v.innerHTML = filtrados.map(p => `
        <div class="p-card" style="opacity: ${p.estoque > 0 ? 1 : 0.6}">
            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=Sem+Foto'">
            <div class="p-nome">${p.nome}</div>
            <div class="p-preco">R$ ${p.preco}</div>
            <div class="p-estoque ${p.estoque > 0 ? '' : 'esgotado'}">
                ${p.estoque > 0 ? 'Estoque: ' + p.estoque : 'ESGOTADO'}
            </div>
        </div>`).join('');
}
carregarDados();
</script>
</body>
</html>
