<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gui Perfumaria | Catálogo Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        :root { 
            --primaria: #6d2040; --detalhe: #d4af37; --whatsapp: #25d366; 
            --fundo: #fff9fb; --erro: #d9534f; --promo: #e67e22; --texto: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--fundo); padding-top: 290px; padding-bottom: 80px; color: var(--texto); overflow-x: hidden; }

        /* TOPO FIXO */
        .topo-fixo { position: fixed; top: 0; left: 0; width: 100%; z-index: 2000; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { background: var(--primaria); color: white; padding: 25px 15px; text-align: center; border-bottom: 6px solid var(--detalhe); position: relative; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: var(--detalhe); text-transform: uppercase; }
        
        .cart-superior { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .soma-topo { background: rgba(255,255,255,0.2); border: 1px solid var(--detalhe); color: white; padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.8rem; }
        .btn-cart-topo { background: var(--whatsapp); color: white; border: none; padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 800; font-size: 0.7rem; }

        .area-catalogos { background: white; padding: 12px 0; border-bottom: 1px solid #f0f0f0; text-align: center; }
        .grade-logos { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .item-logo { text-decoration: none; display: flex; flex-direction: column; align-items: center; width: 65px; }
        .img-box { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #eee; display: flex; align-items: center; justify-content: center; background: white; overflow: hidden; margin-bottom: 5px; }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }
        .item-logo span { font-size: 8px; font-weight: 800; color: #666; text-transform: uppercase; }

        .filtros { display: flex; gap: 8px; overflow-x: auto; padding: 12px; background: #fbfbfb; border-bottom: 1px solid #eee; scrollbar-width: none; }
        .filtros::-webkit-scrollbar { display: none; }
        .btn-filtro { background: white; border: 1px solid #ddd; padding: 8px 16px; border-radius: 20px; font-size: 10px; font-weight: 800; white-space: nowrap; cursor: pointer; color: #666; text-transform: uppercase; }
        .btn-filtro.active { background: var(--primaria); color: white; border-color: var(--primaria); }

        /* CONTAINER DO BANNER (ROTAÇÃO) */
        #banner-container { margin: 15px; position: relative; display: none; }
        
        .banner-promo { 
            background: linear-gradient(135deg, #b31217 0%, #e67e22 100%); 
            border-radius: 15px; 
            padding: 25px 20px; 
            color: white; 
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
            border: 2px solid var(--detalhe);
            display: none; /* Controlado pelo JS */
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .img-banner-promo { width: 150px; height: 150px; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4)); }

        .conteudo-banner-promo { flex: 1; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
        .banner-promo h4 { font-size: 0.65rem; text-transform: uppercase; font-weight: 800; color: var(--detalhe); letter-spacing: 1px; }
        .banner-promo h2 { font-size: 0.95rem; font-weight: 800; line-height: 1.2; margin: 4px 0; height: 35px; overflow: hidden; }
        .banner-promo .preco-banner { font-size: 1.6rem; font-weight: 900; color: #fff; margin-bottom: 8px; }
        
        .btn-banner-add { background: white; color: #b31217; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.75rem; width: fit-content; box-shadow: 0 4px 0 var(--detalhe); }
        .btn-banner-add:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--detalhe); }

        .btn-ver-mais-promo { background: var(--detalhe); color: var(--primaria); border: none; padding: 8px 12px; border-radius: 20px; font-weight: 800; font-size: 0.65rem; margin-top: 10px; cursor: pointer; text-transform: uppercase; }

        .tarja { position: absolute; top: 10px; left: -30px; background: var(--detalhe); color: var(--primaria); padding: 5px 35px; font-weight: 900; font-size: 0.7rem; transform: rotate(-35deg); z-index: 5; text-transform: uppercase; }

        /* INDICADORES (BOLINHAS) */
        .dots-container { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .dot { width: 8px; height: 8px; background: #ccc; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--primaria); width: 20px; border-radius: 10px; }

        /* VITRINE */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; }
        .p-card { background: white; border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 12px; display: flex; flex-direction: column; height: 100%; position: relative; }
        .p-card img { width: 100%; height: 130px; object-fit: contain; margin-bottom: 10px; }
        .p-nome { font-size: 0.85rem; font-weight: 700; min-height: 40px; margin-bottom: 5px; }
        .p-preco-por { font-weight: 800; color: var(--primaria); font-size: 1.2rem; margin-bottom: 10px; }

        .btn-add { background: var(--primaria); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.85rem; }
        .btn-add:disabled { background: #ccc !important; color: #666 !important; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 4000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 450px; border-radius: 20px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="topo-fixo">
    <header>
        <div class="cart-superior" id="cart-ui" style="display:none;">
            <div class="soma-topo" id="soma-topo">R$ 0,00</div>
            <button class="btn-cart-topo" onclick="abrirResumo()">
                <i class="material-icons" style="font-size:16px;">shopping_basket</i>
                (<span id="count-topo">0</span>)
            </button>
        </div>
        <h1>Gui Perfumaria</h1>
        <p style="font-size: 0.75rem; opacity: 0.9;">Aline Nascimento • Consultora</p>
    </header>

    <div class="area-catalogos">
        <div class="grade-logos">
            <a href="https://encurtador.naturaavon.com/hTUzboh" target="_blank" class="item-logo"><div class="img-box"><img src="assets/natura.png"></div><span>Natura</span></a>
            <a href="https://minhaloja.boticario.com.br/aline-nascimento" target="_blank" class="item-logo"><div class="img-box"><img src="assets/boticario.png"></div><span>Boticário</span></a>
            <a href="https://minhaloja.eudora.com.br/aline-nascimento" target="_blank" class="item-logo"><div class="img-box"><img src="assets/eudora.jpeg"></div><span>Eudora</span></a>
            <a href="https://minhaloja.ouiparis.com/aline-nascimento" target="_blank" class="item-logo"><div class="img-box"><img src="assets/oui.png"></div><span>O.U.i</span></a>
        </div>
    </div>

    <div class="filtros" id="lista-filtros">
        <button class="btn-filtro active" id="btn-todos" onclick="filtrar('todos', this)">TODOS</button>
        <button class="btn-filtro" id="btn-promo-filtro" style="border-color: var(--promo); color: var(--promo);" onclick="filtrar('promo', this)">🔥 PROMOÇÕES</button>
    </div>
</div>

<div id="banner-container">
    <div id="banners-wrapper"></div>
    <div class="dots-container" id="dots-wrapper"></div>
</div>

<div id="loading" style="text-align:center; padding:50px; font-weight:800; color:var(--primaria);">CARREGANDO...</div>
<div class="vitrine" id="vitrine"></div>

<div id="modal-resumo" class="modal">
    <div class="modal-content">
        <h3 style="font-weight: 800; border-bottom: 2px solid #eee; padding-bottom: 10px;">MEU PEDIDO</h3>
        <div id="lista-resumo" style="margin:15px 0;"></div>
        <div id="modal-total" style="font-weight: 800; font-size: 1.5rem; text-align: right;">Total: R$ 0,00</div>
        <button style="background:var(--whatsapp); color:white; width:100%; border:none; padding:18px; border-radius:12px; font-weight:800; cursor:pointer; margin-top:10px;" onclick="enviarWhatsapp()">FINALIZAR NO WHATSAPP</button>
        <p onclick="fecharResumo()" style="text-align:center; margin-top:15px; cursor:pointer; font-weight:800; font-size:12px; color:#999;">FECHAR</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQZxhG0vIEsRAw40jA4v1vMauSy16U-qKuvOmzVTYHIdKLz89jzHvaKxbDA2NQI2xnYRgn2a-DFdUjc/pub?output=csv&cachebust=' + new Date().getTime();

let carrinho = {}; 
let categoriasUnicas = new Set();
let bannerIndex = 0;

function converterParaCentavos(valor) {
    if (!valor) return 0;
    let limpo = valor.toString().replace(/R\$/g, '').replace(/\s/g, '').replace(/\./g, '').replace(',', '.');
    let numero = parseFloat(limpo);
    return isNaN(numero) ? 0 : Math.round(numero * 100);
}

function formatarMoeda(centavos) {
    return (centavos / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function carregarDados() {
    Papa.parse(URL_CSV, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            window.PRODUTOS = results.data.map((item, idx) => {
                const v = Object.values(item);
                const pNormal = String(v[4] || "0").trim();
                const pPromo = String(v[7] || "").trim();
                const cat = String(v[2] || "Geral").trim(); 
                if(cat && cat !== "Categoria") categoriasUnicas.add(cat);
                return { 
                    id: idx, nome: String(v[3] || "").trim(), categoria: cat,
                    precoOriginal: pNormal, precoPromo: pPromo,
                    precoVendaCents: pPromo !== "" ? converterParaCentavos(pPromo) : converterParaCentavos(pNormal),
                    img: String(v[5] || "").trim(), estoqueOriginal: parseInt(v[6]) || 0, estoqueAtual: parseInt(v[6]) || 0, emOferta: pPromo !== ""
                };
            }).filter(p => p.nome);

            gerarBanners();
            gerarBotoesFiltro();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('cart-ui').style.display = 'flex';
            render(window.PRODUTOS);
        }
    });
}

function gerarBanners() {
    const ofertas = window.PRODUTOS.filter(p => p.emOferta && p.estoqueAtual > 0);
    const container = document.getElementById('banner-container');
    const wrapper = document.getElementById('banners-wrapper');
    const dots = document.getElementById('dots-wrapper');
    
    if (ofertas.length === 0) return;
    
    container.style.display = 'block';
    const topOfertas = ofertas.slice(0, 5); // Pega até 5 produtos

    topOfertas.forEach((p, idx) => {
        const div = document.createElement('div');
        div.className = 'banner-promo';
        div.id = `banner-slide-${idx}`;
        div.innerHTML = `
            <div class="tarja">OFERTA</div>
            <img class="img-banner-promo" src="${p.img}">
            <div class="conteudo-banner-promo">
                <h4>Promoção do Dia</h4>
                <h2>${p.nome}</h2>
                <span class="preco-banner">R$ ${p.precoPromo}</span>
                <button class="btn-banner-add" onclick="addCart(${p.id})">Adicionar ao Carrinho</button>
                ${ofertas.length > 5 && idx === topOfertas.length - 1 ? 
                  `<button class="btn-ver-mais-promo" onclick="document.getElementById('btn-promo-filtro').click()">+ Ver todas as ${ofertas.length} ofertas</button>` 
                  : ''}
            </div>
        `;
        wrapper.appendChild(div);

        const dot = document.createElement('div');
        dot.className = 'dot' + (idx === 0 ? ' active' : '');
        dot.id = `dot-${idx}`;
        dots.appendChild(dot);
    });

    startBannerRotation(topOfertas.length);
}

function startBannerRotation(total) {
    if(total <= 1) {
        document.querySelector('.banner-promo').style.display = 'flex';
        return;
    }
    
    function showSlide(idx) {
        document.querySelectorAll('.banner-promo').forEach(b => b.style.display = 'none');
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        
        document.getElementById(`banner-slide-${idx}`).style.display = 'flex';
        document.getElementById(`dot-${idx}`).classList.add('active');
    }

    showSlide(0);
    setInterval(() => {
        bannerIndex = (bannerIndex + 1) % total;
        showSlide(bannerIndex);
    }, 5000); // Troca a cada 5 segundos
}

function gerarBotoesFiltro() {
    const div = document.getElementById('lista-filtros');
    categoriasUnicas.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'btn-filtro';
        btn.innerText = cat;
        btn.onclick = () => filtrar(cat, btn);
        div.appendChild(btn);
    });
}

function filtrar(cat, btn) {
    document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    let filtrados = cat === 'todos' ? window.PRODUTOS : (cat === 'promo' ? window.PRODUTOS.filter(p => p.emOferta) : window.PRODUTOS.filter(p => p.categoria === cat));
    
    // Esconde banners se não estiver em "Todos"
    document.getElementById('banner-container').style.display = (cat === 'todos') ? 'block' : 'none';
    
    render(filtrados);
}

function render(lista) {
    const v = document.getElementById('vitrine');
    v.innerHTML = lista.map((p) => {
        const esgotado = p.estoqueAtual <= 0;
        const porcentagem = p.estoqueOriginal > 0 ? (p.estoqueAtual / p.estoqueOriginal) * 100 : 0;
        return `
        <div class="p-card">
            ${p.emOferta ? '<div style="position:absolute; top:10px; right:10px; background:var(--promo); color:white; font-size:9px; padding:4px 8px; border-radius:10px; font-weight:800;">OFERTA</div>' : ''}
            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'">
            <div class="p-nome">${p.nome}</div>
            <div class="p-preco-por" style="${p.emOferta ? 'color:var(--promo)' : ''}">${p.emOferta ? 'R$ ' + p.precoPromo : 'R$ ' + p.precoOriginal}</div>
            <div class="barra-estoque" style="width:100%; height:6px; background:#eee; border-radius:10px; overflow:hidden; margin-bottom:10px;"><div style="height:100%; background:var(--erro); width:${porcentagem}%"></div></div>
            <button class="btn-add" id="btn-${p.id}" onclick="addCart(${p.id})" ${esgotado ? 'disabled' : ''}>${esgotado ? 'ESGOTADO' : 'ADICIONAR'}</button>
        </div>`;
    }).join('');
}

function addCart(id) {
    const p = window.PRODUTOS.find(prod => prod.id === id);
    if (p.estoqueAtual <= 0) return;
    if (!carrinho[p.nome]) {
        carrinho[p.nome] = { precoCents: p.precoVendaCents, exibirPreco: p.emOferta ? p.precoPromo : p.precoOriginal, qtd: 1, id: id };
    } else { carrinho[p.nome].qtd++; }
    p.estoqueAtual--;
    atualizarTudo();
}

function atualizarTudo() {
    let totalCents = 0, totalItens = 0;
    for (let nome in carrinho) { totalCents += (carrinho[nome].precoCents * carrinho[nome].qtd); totalItens += carrinho[nome].qtd; }
    document.getElementById('soma-topo').innerText = formatarMoeda(totalCents);
    document.getElementById('modal-total').innerText = `Total: ${formatarMoeda(totalCents)}`;
    document.getElementById('count-topo').innerText = totalItens;
    render(window.PRODUTOS);
}

function abrirResumo() {
    const lista = document.getElementById('lista-resumo');
    lista.innerHTML = Object.keys(carrinho).map(nome => `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${carrinho[nome].qtd}x ${nome}</span><b>R$ ${carrinho[nome].exibirPreco}</b></div>`).join('');
    document.getElementById('modal-resumo').style.display = 'flex';
}
function fecharResumo() { document.getElementById('modal-resumo').style.display = 'none'; }
function enviarWhatsapp() {
    let msg = `🛍️ *PEDIDO - GUI PERFUMARIA*\n\n`;
    for (let nome in carrinho) { msg += `✅ ${carrinho[nome].qtd}x ${nome}\n`; }
    msg += `\n💰 *TOTAL: ${document.getElementById('modal-total').innerText}*`;
    window.open(`https://wa.me/5571987692157?text=${encodeURIComponent(msg)}`, '_blank');
}
carregarDados();
</script>
</body>
</html>
