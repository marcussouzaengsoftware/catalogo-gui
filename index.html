<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gui Perfumaria | Catálogo Digital</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        :root { --primaria: #0f2621; --detalhe: #d4af37; --whatsapp: #25d366; --fundo: #fcfcfc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--fundo); padding-bottom: 80px; color: #333; }
        header { background: var(--primaria); color: white; padding: 25px 20px; text-align: center; position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--detalhe); }
        .logo h1 { font-size: 1.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--detalhe); border: 2px solid var(--detalhe); display: inline-block; padding: 5px 20px; margin-bottom: 5px; }
        .marcas-logos { display: flex; overflow-x: auto; gap: 20px; padding: 20px; background: white; border-bottom: 1px solid #eee; scrollbar-width: none; }
        .logo-link { flex: 0 0 auto; text-align: center; text-decoration: none; color: #666; font-size: 10px; font-weight: bold; }
        .logo-link img { width: 60px; height: 60px; object-fit: contain; display: block; margin-bottom: 5px; border-radius: 50%; border: 1px solid #eee; padding: 5px; background: #fff; }
        .nav-categorias { background: white; padding: 10px; overflow-x: auto; white-space: nowrap; display: flex; gap: 10px; border-bottom: 1px solid #eee; position: sticky; top: 110px; z-index: 999; scrollbar-width: none; }
        .cat-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--primaria); background: transparent; color: var(--primaria); font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .cat-btn.active { background: var(--primaria); color: white; }
        .vitrine { max-width: 1100px; margin: 15px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 0 15px; }
        .p-card { background: white; border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between; height: 100%; position: relative; }
        .p-card img { width: 100%; height: 140px; object-fit: contain; margin-bottom: 10px; }
        .tag-marca { font-size: 9px; font-weight: bold; color: white; background: var(--detalhe); padding: 2px 6px; border-radius: 4px; position: absolute; top: 8px; left: 8px; text-transform: uppercase; }
        .p-nome { font-weight: 600; font-size: 0.85rem; line-height: 1.2; margin-bottom: 10px; color: var(--primaria); min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .p-preco { font-size: 1.1rem; font-weight: 800; color: #333; margin: 8px 0; }
        .btn-add { background: var(--primaria); color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 6px; text-transform: uppercase; width: 100%; font-size: 0.75rem; }
        .cart-icon { position: absolute; right: 15px; top: 25px; background: var(--detalhe); color: white; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #side-cart { position: fixed; right: -100%; top: 0; width: 100%; max-width: 360px; height: 100%; background: white; z-index: 2001; transition: 0.4s; padding: 25px; display: flex; flex-direction: column; box-shadow: -5px 0 20px rgba(0,0,0,0.1); }
        #side-cart.open { right: 0; }
    </style>
</head>
<body>
<header>
    <div class="logo"><h1>Gui Perfumaria</h1></div>
    <p style="font-size: 0.8rem;">Consultora: Aline Souza</p>
    <button class="cart-icon" onclick="toggleCart()">
        <span class="material-icons">shopping_bag</span>
        <span id="c-count" style="position:absolute; top:-5px; right:-5px; background:#d9534f; border-radius:50%; width:20px; height:20px; font-size:11px; display:flex; align-items:center; justify-content:center; border:2px solid white">0</span>
    </button>
</header>

<div class="marcas-logos">
    <a href="https://www.natura.com.br/consultoria/guiparfumaria" target="_blank" class="logo-link">
        <img src="https://logodownload.org/wp-content/uploads/2014/10/natura-logo-2.png">NATURA
    </a>
    <a href="https://catalogo.oboticario.com.br/" target="_blank" class="logo-link">
        <img src="https://logodownload.org/wp-content/uploads/2014/10/o-boticario-logo-8.png">BOTICÁRIO
    </a>
    <a href="https://www.eudora.com.br/guia-virtual/" target="_blank" class="logo-link">
        <img src="https://logodownload.org/wp-content/uploads/2018/02/eudora-logo.png">EUDORA
    </a>
    <a href="https://www.ouiparis.com/guia-virtual" target="_blank" class="logo-link">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A6R_A6y9_7hDk6_8_2-V-uY6m2l0R4x2qg&s">O.U.i PARIS
    </a>
</div>

<div class="nav-categorias" id="filtro-marcas">
    <button class="cat-btn active" onclick="filtrar('TODOS', this)">Todos</button>
</div>

<div id="loading" style="text-align:center; padding:50px;">Carregando produtos...</div>
<div class="vitrine" id="vitrine" style="display:none;"></div>

<div id="side-cart">
    <h3>🛍️ Meu Pedido</h3>
    <div id="cart-list" style="flex-grow:1; overflow-y:auto; margin:20px 0;"></div>
    <p>Total: <b>R$ <span id="cart-total">0,00</span></b></p>
    <button onclick="send()" style="background:var(--whatsapp); color:white; border:none; width:100%; padding:18px; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:10px;">FINALIZAR WHATSAPP</button>
    <button onclick="toggleCart()" style="margin-top:10px; background:none; border:none; color:#999; cursor:pointer;">Fechar</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQZxhG0vIEsRAw40jA4v1vMauSy16U-qKuvOmzVTYHIdKLz89jzHvaKxbDA2NQI2xnYRgn2a-DFdUjc/pub?output=csv';
const WHATSAPP_NUM = "5571987692157";
let PRODUTOS = [], cart = {}, filtroAtual = "TODOS";

function carregarDados() {
    Papa.parse(URL_CSV, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            PRODUTOS = results.data.map((item, index) => {
                const v = Object.values(item);
                if (v.length < 5) return null;
                const limpar = (t) => t ? t.replace(/^"|"$/g, '').trim() : "";
                return {
                    id: limpar(v[0]) || index,
                    marca: limpar(v[1]),
                    nome: limpar(v[3]),
                    preco: parseFloat(limpar(v[4]).replace('R$', '').replace(/\./g, '').replace(',', '.')) || 0,
                    img: limpar(v[5]),
                    estoque: parseInt(limpar(v[6])) || 0
                };
            }).filter(p => p && p.nome);
            gerarFiltros();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('vitrine').style.display = 'grid';
            render();
        }
    });
}

function gerarFiltros() {
    const marcas = [...new Set(PRODUTOS.map(p => p.marca))].filter(Boolean);
    marcas.forEach(m => document.getElementById('filtro-marcas').innerHTML += `<button class="cat-btn" onclick="filtrar('${m}', this)">${m}</button>`);
}

function filtrar(m, btn) {
    filtroAtual = m;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function render() {
    const v = document.getElementById('vitrine');
    const filtrados = filtroAtual === "TODOS" ? PRODUTOS : PRODUTOS.filter(p => p.marca.toUpperCase().includes(filtroAtual.toUpperCase()));
    v.innerHTML = filtrados.map(p => `
        <div class="p-card" style="opacity: ${p.estoque > 0 ? 1 : 0.6}">
            <span class="tag-marca">${p.marca}</span>
            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/200?text=Sem+Foto'">
            <div class="p-nome">${p.nome}</div>
            <div class="p-preco">R$ ${p.preco.toFixed(2).replace('.',',')}</div>
            <button class="btn-add" onclick="add('${p.id}')" ${p.estoque > 0 ? '' : 'disabled'}>
                ${p.estoque > 0 ? 'Adicionar' : 'Esgotado'}
            </button>
        </div>`).join('');
}

function add(id) {
    const p = PRODUTOS.find(x => x.id == id);
    if (cart[id]) { if (cart[id].q < p.estoque) cart[id].q++; else alert("Sem estoque!"); } 
    else { cart[id] = { ...p, q: 1 }; }
    upd();
}

function upd() {
    const l = document.getElementById('cart-list');
    let t = 0, c = 0; l.innerHTML = '';
    for (let id in cart) {
        const p = cart[id]; t += p.preco * p.q; c += p.q;
        l.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${p.nome} (x${p.q})</span><b>R$ ${(p.preco * p.q).toFixed(2).replace('.',',')}</b></div>`;
    }
    document.getElementById('cart-total').innerText = t.toFixed(2).replace('.',',');
    document.getElementById('c-count').innerText = c;
}

function toggleCart() { document.getElementById('side-cart').classList.toggle('open'); }

function send() {
    const itens = Object.values(cart); if (!itens.length) return;
    let txt = `🛍️ *NOVO PEDIDO*\n\n`;
    itens.forEach(p => txt += `✅ ${p.q}x ${p.nome}\n`);
    txt += `\n💰 *TOTAL: R$ ${document.getElementById('cart-total').innerText}*`;
    window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(txt)}`);
}

carregarDados();
</script>
</body>
</html>
