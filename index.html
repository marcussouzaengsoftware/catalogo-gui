<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gui Perfumaria | Catálogo Digital</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        :root { --primaria: #0f2621; --detalhe: #d4af37; --whatsapp: #25d366; --fundo: #fcfcfc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--fundo); padding-bottom: 80px; }
        header { background: var(--primaria); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--detalhe); }
        
        /* SEÇÃO DE LOGOS - TODOS IGUAIS */
        .area-catalogos { background: white; padding: 15px; border-bottom: 1px solid #eee; }
        .titulo-secao { font-size: 12px; font-weight: bold; color: #666; text-transform: uppercase; text-align: center; margin-bottom: 15px; letter-spacing: 1px; }
        .grade-logos { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .item-logo { text-decoration: none; text-align: center; width: 80px; }
        .item-logo img { width: 60px; height: 60px; object-fit: contain; border-radius: 50%; border: 2px solid #f0f0f0; padding: 5px; background: white; transition: 0.3s; }
        .item-logo:hover img { border-color: var(--detalhe); transform: scale(1.1); }
        .item-logo span { display: block; font-size: 10px; font-weight: bold; color: #333; margin-top: 5px; text-transform: uppercase; }

        .nav-categorias { background: white; padding: 10px; overflow-x: auto; display: flex; gap: 10px; border-bottom: 1px solid #eee; position: sticky; top: 105px; z-index: 999; }
        .cat-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--primaria); background: transparent; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .cat-btn.active { background: var(--primaria); color: white; }
        .vitrine { max-width: 1100px; margin: 15px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 0 15px; }
        .p-card { background: white; border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between; height: 100%; position: relative; }
        .p-card img { width: 100%; height: 140px; object-fit: contain; }
        .p-nome { font-weight: 600; font-size: 0.85rem; margin: 10px 0; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .p-preco { font-size: 1.1rem; font-weight: 800; color: #333; }
        .btn-add { background: var(--primaria); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 1.4rem; color: var(--detalhe);">GUI PERFUMARIA</h1>
    <p style="font-size: 0.8rem;">Consultora: Aline Souza</p>
</header>

<div class="area-catalogos">
    <p class="titulo-secao">Acesse os Catálogos Oficiais</p>
    <div class="grade-logos">
        <a href="https://www.natura.com.br/consultoria/guiparfumaria" target="_blank" class="item-logo">
            <img src="https://logodownload.org/wp-content/uploads/2014/10/natura-logo-2.png">
            <span>Natura</span>
        </a>
        <a href="https://catalogo.oboticario.com.br/" target="_blank" class="item-logo">
            <img src="https://logodownload.org/wp-content/uploads/2014/10/o-boticario-logo-8.png">
            <span>Boticário</span>
        </a>
        <a href="https://www.eudora.com.br/guia-virtual/" target="_blank" class="item-logo">
            <img src="https://logodownload.org/wp-content/uploads/2018/02/eudora-logo.png">
            <span>Eudora</span>
        </a>
        <a href="https://www.ouiparis.com/guia-virtual" target="_blank" class="item-logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A6R_A6y9_7hDk6_8_2-V-uY6m2l0R4x2qg&s">
            <span>O.U.i Paris</span>
        </a>
    </div>
</div>

<div class="nav-categorias" id="filtro-marcas">
    <button class="cat-btn active" onclick="filtrar('TODOS', this)">Todos</button>
</div>

<div id="loading" style="text-align:center; padding:50px;">Sincronizando produtos...</div>
<div class="vitrine" id="vitrine" style="display:none;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQZxhG0vIEsRAw40jA4v1vMauSy16U-qKuvOmzVTYHIdKLz89jzHvaKxbDA2NQI2xnYRgn2a-DFdUjc/pub?output=csv';

function carregarDados() {
    Papa.parse(URL_CSV, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            window.PRODUTOS = results.data.map((item, index) => {
                const v = Object.values(item);
                if (v.length < 5) return null;
                return {
                    id: index,
                    marca: v[1] || "",
                    nome: v[3] || "",
                    preco: v[4] || "0,00",
                    img: v[5] || "",
                    estoque: parseInt(v[6]) || 0
                };
            }).filter(p => p && p.nome);
            
            const marcas = [...new Set(window.PRODUTOS.map(p => p.marca))].filter(Boolean);
            marcas.forEach(m => document.getElementById('filtro-marcas').innerHTML += `<button class="cat-btn" onclick="filtrar('${m}', this)">${m}</button>`);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('vitrine').style.display = 'grid';
            render('TODOS');
        }
    });
}

function filtrar(m, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(m);
}

function render(filtro) {
    const v = document.getElementById('vitrine');
    const filtrados = filtro === 'TODOS' ? window.PRODUTOS : window.PRODUTOS.filter(p => p.marca === filtro);
    v.innerHTML = filtrados.map(p => `
        <div class="p-card" style="opacity: ${p.estoque > 0 ? 1 : 0.5}">
            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=Sem+Foto'">
            <div class="p-nome">${p.nome}</div>
            <div class="p-preco">R$ ${p.preco}</div>
            <button class="btn-add" ${p.estoque > 0 ? '' : 'disabled'}>${p.estoque > 0 ? 'Adicionar' : 'Esgotado'}</button>
        </div>`).join('');
}
carregarDados();
</script>
</body>
</html>
