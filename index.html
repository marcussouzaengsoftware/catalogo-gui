<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gui Perfumaria | Catálogo Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        :root { --primaria: #0f2621; --detalhe: #d4af37; --whatsapp: #25d366; --fundo: #fcfcfc; --erro: #d9534f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--fundo); padding-top: 320px; padding-bottom: 80px; } 

        /* TOPO */
        .topo-fixo { position: fixed; top: 0; left: 0; width: 100%; z-index: 2000; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { background: var(--primaria); color: white; padding: 40px 15px; text-align: center; border-bottom: 6px solid var(--detalhe); position: relative; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--detalhe); text-transform: uppercase; letter-spacing: 2px; }
        header p { font-size: 1.1rem; color: #ccc; margin-top: 5px; font-weight: 400; }

        /* CARRINHO NO TOPO */
        .cart-superior { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .soma-topo { background: rgba(255,255,255,0.1); border: 1px solid var(--detalhe); color: var(--detalhe); padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.9rem; }
        .btn-cart-topo { background: var(--whatsapp); color: white; border: none; padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 800; font-size: 0.85rem; }

        /* BOTÃO SUPORTE FLUTUANTE (INFERIOR ESQUERDO) */
        .btn-suporte { position: fixed; bottom: 20px; left: 20px; background: white; color: #333; padding: 10px 15px; border-radius: 30px; display: flex; align-items: center; gap: 8px; text-decoration: none; font-weight: 800; font-size: 0.8rem; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #eee; z-index: 3000; }
        .btn-suporte i { color: var(--whatsapp); font-size: 20px; }

        /* MARCAS */
        .area-catalogos { background: white; padding: 20px 0; border-bottom: 1px solid #eee; text-align: center; }
        .grade-logos { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .item-logo { text-decoration: none; display: flex; flex-direction: column; align-items: center; width: 85px; }
        .img-box { width: 75px; height: 75px; border-radius: 50%; border: 2px solid #f0f0f0; display: flex; align-items: center; justify-content: center; background: white; overflow: hidden; margin-bottom: 8px; }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }
        .item-logo span { font-size: 10px; font-weight: 800; color: var(--primaria); text-transform: uppercase; }

        /* VITRINE */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; }
        .p-card { background: white; border: 1px solid #eee; padding: 15px; text-align: center; border-radius: 12px; display: flex; flex-direction: column; height: 100%; transition: transform 0.2s; }
        .p-card:active { transform: scale(0.98); }
        .p-card img { width: 100%; height: 130px; object-fit: contain; margin-bottom: 10px; }
        .p-nome { font-size: 0.85rem; font-weight: 700; min-height: 40px; color: #333; margin-bottom: 5px; }
        .p-preco { font-weight: 800; color: var(--primaria); font-size: 1.2rem; }
        .p-estoque { font-size: 10px; color: var(--erro); font-weight: bold; margin-bottom: 10px; }
        .btn-add { background: var(--primaria); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: auto; }
        .btn-add:disabled { background: #ccc; }

        /* MODAL */
        #modal-resumo { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 4000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 450px; border-radius: 20px; padding: 25px; }
        .header-resumo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .btn-limpar { background: #fff5f5; border: 1px solid var(--erro); color: var(--erro); padding: 5px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; font-weight: 800; }
        .item-resumo { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .btn-confirmar { background: var(--whatsapp); color: white; width: 100%; border: none; padding: 18px; border-radius: 12px; font-weight: 800; margin-top: 20px; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="topo-fixo">
    <header>
        <div class="cart-superior" id="cart-ui" style="display:none;">
            <div class="soma-topo" id="soma-topo">R$ 0,00</div>
            <button class="btn-cart-topo" onclick="abrirResumo()">
                <i class="material-icons" style="font-size:18px;">shopping_basket</i>
                PEDIDO (<span id="count-topo">0</span>)
            </button>
        </div>
        <h1>Gui Perfumaria</h1>
        <p>Aline Nascimento • Consultora</p>
    </header>

    <div class="area-catalogos">
        <div class="grade-logos">
            <a href="https://encurtador.naturaavon.com/hTUzboh" target="_blank" class="item-logo"><div class="img-box"><img src="assets/natura.png"></div><span>Natura</span></a>
            <a href="https://minhaloja.boticario.com.br/aline-nascimento" target="_blank" class="item-logo"><div class="img-box"><img src="assets/boticario.png"></div><span>Boticário</span></a>
            <a href="https://minhaloja.eudora.com.br/aline-nascimento" target="_blank" class="item-logo"><div class="img-box"><img src="assets/eudora.jpeg"></div><span>Eudora</span></a>
            <a href="https://minhaloja.ouiparis.com/aline-nascimento" target="_blank" class="item-logo"><div class="img-box"><img src="assets/oui.png"></div><span>O.U.i</span></a>
        </div>
    </div>
</div>

<div id="loading" style="text-align:center; padding:100px; font-weight:800;">ATUALIZANDO ESTOQUE...</div>
<div class="vitrine" id="vitrine"></div>

<a href="https://wa.me/5571987692157?text=Olá Aline! Tenho uma dúvida sobre o catálogo." target="_blank" class="btn-suporte">
    <i class="material-icons">whatsapp</i>
    DÚVIDAS? FALE COMIGO
</a>

<div id="modal-resumo">
    <div class="modal-content">
        <div class="header-resumo">
            <h3 style="font-weight: 800;">MEU PEDIDO</h3>
            <button class="btn-limpar" onclick="limparPedido()">LIMPAR</button>
        </div>
        <div id="lista-resumo"></div>
        <div id="modal-total" style="font-weight: 800; font-size: 1.6rem; text-align: right; margin-top: 20px;">Total: R$ 0,00</div>
        <button class="btn-confirmar" onclick="enviarWhatsapp()">CONCLUIR NO WHATSAPP</button>
        <p onclick="fecharResumo()" style="text-align:center; margin-top:20px; cursor:pointer; color:#999; font-weight:800; font-size:12px;">CONTINUAR COMPRANDO</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQZxhG0vIEsRAw40jA4v1vMauSy16U-qKuvOmzVTYHIdKLz89jzHvaKxbDA2NQI2xnYRgn2a-DFdUjc/pub?output=csv&cachebust=' + new Date().getTime();

let carrinho = {}; 

function converterParaCentavos(texto) {
    if (!texto) return 0;
    let limpo = texto.toString().replace(/[R$\s.]/g, '').replace(',', '.');
    return Math.round(parseFloat(limpo) * 100) || 0;
}

function formatarMoeda(centavos) {
    return (centavos / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function carregarDados() {
    Papa.parse(URL_CSV, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            window.PRODUTOS = results.data.map((item, idx) => {
                const v = Object.values(item);
                return { 
                    id: idx, nome: String(v[3] || "").trim(), 
                    precoTexto: String(v[4] || "0,00").trim(), 
                    img: String(v[5] || "").trim(), 
                    estoqueAtual: parseInt(v[6]) || 0
                };
            }).filter(p => p.nome);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('cart-ui').style.display = 'flex';
            render();
        }
    });
}

function render() {
    const v = document.getElementById('vitrine');
    v.innerHTML = window.PRODUTOS.map((p) => `
        <div class="p-card">
            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=Produto'">
            <div class="p-nome">${p.nome}</div>
            <div class="p-preco">R$ ${p.precoTexto}</div>
            <div class="p-estoque" id="est-${p.id}">Estoque: ${p.estoqueAtual}</div>
            <button class="btn-add" id="btn-${p.id}" onclick="addCart(${p.id})" ${p.estoqueAtual <= 0 ? 'disabled' : ''}>
                ${p.estoqueAtual <= 0 ? 'ESGOTADO' : 'ADICIONAR'}
            </button>
        </div>`).join('');
}

function addCart(id) {
    const p = window.PRODUTOS[id];
    if (p.estoqueAtual <= 0) return;
    if (!carrinho[p.nome]) {
        carrinho[p.nome] = { precoCents: converterParaCentavos(p.precoTexto), precoOriginal: p.precoTexto, qtd: 1, id: id };
    } else { carrinho[p.nome].qtd++; }
    p.estoqueAtual--;
    atualizarTudo();
}

function mudarQtd(nome, delta) {
    const item = carrinho[nome];
    const p = window.PRODUTOS[item.id];
    if (delta > 0) {
        if (p.estoqueAtual <= 0) return;
        item.qtd++; p.estoqueAtual--;
    } else {
        item.qtd--; p.estoqueAtual++;
        if (item.qtd <= 0) delete carrinho[nome];
    }
    atualizarTudo();
    if (Object.keys(carrinho).length === 0) fecharResumo();
    else abrirResumo();
}

function limparPedido() {
    if(!confirm("Limpar pedido atual?")) return;
    for (let nome in carrinho) {
        window.PRODUTOS[carrinho[nome].id].estoqueAtual += carrinho[nome].qtd;
    }
    carrinho = {};
    atualizarTudo();
    fecharResumo();
}

function atualizarTudo() {
    let totalCents = 0, totalItens = 0;
    for (let nome in carrinho) {
        totalCents += carrinho[nome].precoCents * carrinho[nome].qtd;
        totalItens += carrinho[nome].qtd;
    }
    document.getElementById('soma-topo').innerText = formatarMoeda(totalCents);
    document.getElementById('modal-total').innerText = `Total: ${formatarMoeda(totalCents)}`;
    document.getElementById('count-topo').innerText = totalItens;

    window.PRODUTOS.forEach(p => {
        const est = document.getElementById(`est-${p.id}`);
        const btn = document.getElementById(`btn-${p.id}`);
        if(est) est.innerText = `Estoque: ${p.estoqueAtual}`;
        if(btn) {
            btn.disabled = p.estoqueAtual <= 0;
            btn.innerText = p.estoqueAtual <= 0 ? 'ESGOTADO' : 'ADICIONAR';
        }
    });
}

function abrirResumo() {
    const lista = document.getElementById('lista-resumo');
    const nomes = Object.keys(carrinho);
    if (nomes.length === 0) return;
    lista.innerHTML = nomes.map(nome => `
        <div class="item-resumo">
            <div><b style="font-size:0.9rem">${nome}</b><br><small>R$ ${carrinho[nome].precoOriginal}</small></div>
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="material-icons" style="cursor:pointer; color:var(--erro)" onclick="mudarQtd('${nome}', -1)">remove_circle</i>
                <b>${carrinho[nome].qtd}</b>
                <i class="material-icons" style="cursor:pointer; color:var(--primaria)" onclick="mudarQtd('${nome}', 1)">add_circle</i>
            </div>
        </div>`).join('');
    document.getElementById('modal-resumo').style.display = 'flex';
}

function fecharResumo() { document.getElementById('modal-resumo').style.display = 'none'; }

function enviarWhatsapp() {
    let msg = "*PEDIDO - GUI PERFUMARIA*\n\n";
    let total = 0;
    for (let nome in carrinho) {
        msg += `✅ ${carrinho[nome].qtd}x ${nome}\n`;
        total += carrinho[nome].precoCents * carrinho[nome].qtd;
    }
    msg += `\n*TOTAL: ${formatarMoeda(total)}*`;
    window.open(`https://wa.me/5571987692157?text=${encodeURIComponent(msg)}`);
}
carregarDados();
</script>
</body>
</html>
